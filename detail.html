<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>CharaChat - キャラ詳細</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0d0d0d;color:#eee;font-family:'Hiragino Sans','Noto Sans JP',sans-serif;width:390px;min-height:100vh;margin:0 auto;overflow-x:hidden;}

.detail-header{
  position:fixed;top:0;left:50%;transform:translateX(-50%);
  width:390px;z-index:50;
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 16px;
  background:linear-gradient(to bottom,rgba(0,0,0,.7),transparent);
}
.header-back{
  width:36px;height:36px;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.15);
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:1rem;cursor:pointer;color:#fff;text-decoration:none;border:none;
}
.header-share{
  width:36px;height:36px;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.15);
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:1rem;cursor:pointer;color:#fff;border:none;
}

.hero-img{width:390px;height:420px;object-fit:cover;object-position:top;display:block;}
.hero-emoji{width:390px;height:420px;background:linear-gradient(135deg,#1a0030,#0d0d0d);display:flex;align-items:center;justify-content:center;font-size:7rem;}
.hero-gradient{position:relative;margin-top:-80px;height:80px;background:linear-gradient(to bottom,transparent,#0d0d0d);pointer-events:none;}

.detail-content{padding:0 20px 20px;}
.detail-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.dtag{font-size:.72rem;color:#9933ff;background:#2a003a;border:1px solid #6600cc;border-radius:12px;padding:3px 10px;}
.detail-name{font-size:2rem;font-weight:900;color:#fff;letter-spacing:2px;margin-bottom:6px;text-shadow:0 2px 20px rgba(0,0,0,.8);}
.divider{border-top:1px solid #222;margin:16px 0;}
.detail-block{background:#111;border:1px solid #222;border-radius:14px;padding:16px;margin-bottom:14px;}
.block-label{font-size:.7rem;color:#666;font-weight:600;letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px;}
.block-text{font-size:.88rem;color:#ccc;line-height:1.75;}

.start-chat-btn{
  display:block;width:100%;
  background:linear-gradient(135deg,#9933ff,#6600cc);
  color:#fff;font-size:1.1rem;font-weight:800;
  padding:16px;border-radius:16px;
  text-align:center;text-decoration:none;
  border:none;cursor:pointer;
  box-shadow:0 6px 30px rgba(153,51,255,.45);
  transition:transform .15s,box-shadow .15s;
  letter-spacing:1px;margin-bottom:20px;
}
.start-chat-btn:hover{transform:translateY(-2px);box-shadow:0 8px 36px rgba(153,51,255,.6);}
.start-chat-btn:active{transform:scale(.98);}

.talk-count-row{display:flex;align-items:center;gap:8px;margin-bottom:16px;}
.talk-count-num{font-size:.85rem;color:#888;}
.talk-count-num span{color:#9933ff;font-weight:700;}

/* タグ詳細 */
.related-chars{padding-bottom:40px;}
.related-title{font-size:.78rem;color:#666;font-weight:600;margin-bottom:10px;letter-spacing:.5px;}
.related-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.related-card{cursor:pointer;border-radius:10px;overflow:hidden;background:#1a1a1a;}
.related-card img{width:100%;height:100px;object-fit:cover;object-position:top;display:block;}
.related-card-emoji{width:100%;height:100px;background:#1a0030;display:flex;align-items:center;justify-content:center;font-size:2rem;}
.related-card-name{font-size:.7rem;color:#ccc;padding:5px 7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
</style>
</head>
<body>

<div class="detail-header">
  <button class="header-back" onclick="history.back()">←</button>
  <button class="header-share" onclick="shareChar()" title="共有">⋯</button>
</div>

<div id="hero-wrap"></div>
<div class="hero-gradient"></div>

<div class="detail-content">
  <div class="detail-tags" id="detail-tags"></div>
  <div class="detail-name" id="detail-name">-</div>
  <div class="talk-count-row">
    <span class="talk-count-num">💬 <span id="talk-count-num">0</span> トーク</span>
  </div>

  <button class="start-chat-btn" id="start-btn" onclick="startChat()">
    💬 会話を始める
  </button>

  <div class="detail-block">
    <div class="block-label">ABOUT</div>
    <div class="block-text" id="detail-desc">-</div>
  </div>

  <div class="detail-block" id="world-block" style="display:none;">
    <div class="block-label">世界観 / 設定</div>
    <div class="block-text" id="detail-world"></div>
  </div>

  <div class="detail-block" id="intro-block" style="display:none;">
    <div class="block-label">最初のセリフ</div>
    <div class="block-text" id="detail-intro" style="white-space:pre-line;"></div>
  </div>

  <div class="related-chars">
    <div class="related-title">関連キャラ</div>
    <div class="related-grid" id="related-grid"></div>
  </div>
</div>

<script src="chars.js"></script>
<script>
const params = new URLSearchParams(location.search);
const charId = params.get('id');

function init() {
  const all = getAllChars();
  const c = all[charId];
  if (!c) {
    document.body.innerHTML = '<div style="text-align:center;color:#555;padding:60px 20px;"><div style="font-size:2rem;margin-bottom:12px;">😢</div>キャラが見つかりません<br><br><a href="index.html" style="color:#9933ff;">ホームへ戻る</a></div>';
    return;
  }

  document.title = 'CharaChat - ' + c.name;

  // ヒーロー
  const heroWrap = document.getElementById('hero-wrap');
  if (c.img) {
    heroWrap.innerHTML = `<img class="hero-img" src="${c.img}" alt="${c.name}">`;
  } else {
    heroWrap.innerHTML = `<div class="hero-emoji">${c.emoji || '🎭'}</div>`;
  }

  // タグ
  const tagsEl = document.getElementById('detail-tags');
  tagsEl.innerHTML = (c.tags || []).map(t => `<span class="dtag">${t}</span>`).join('');

  // 名前
  document.getElementById('detail-name').textContent = c.name;

  // トーク数
  document.getElementById('talk-count-num').textContent = getTalkCount(charId);

  // 説明
  document.getElementById('detail-desc').textContent = c.desc || 'このキャラについての説明はありません。';

  // 世界観
  if (c.world) {
    document.getElementById('world-block').style.display = 'block';
    document.getElementById('detail-world').textContent = c.world;
  }

  // 挨拶
  if (c.intro) {
    document.getElementById('intro-block').style.display = 'block';
    document.getElementById('detail-intro').textContent = c.intro;
  }

  // 関連キャラ（同タグ）
  const related = Object.values(all).filter(x => {
    if (x.id === charId) return false;
    return (c.tags || []).some(t => (x.tags || []).includes(t));
  }).slice(0, 6);

  const rg = document.getElementById('related-grid');
  if (related.length === 0) {
    rg.innerHTML = '<div style="grid-column:1/-1;font-size:.78rem;color:#444;">関連キャラなし</div>';
  } else {
    rg.innerHTML = related.map(r => {
      const imgEl = r.img
        ? `<img src="${r.img}" alt="${r.name}">`
        : `<div class="related-card-emoji">${r.emoji || '🎭'}</div>`;
      return `<div class="related-card" onclick="location.href='detail.html?id=${r.id}'">
        ${imgEl}
        <div class="related-card-name">${r.name}</div>
      </div>`;
    }).join('');
  }
}

function startChat() {
  location.href = 'chat.html?id=' + encodeURIComponent(charId);
}

function shareChar() {
  const name = document.getElementById('detail-name').textContent;
  if (navigator.share) {
    navigator.share({ title: 'CharaChat - ' + name, url: location.href }).catch(() => {});
  } else {
    navigator.clipboard?.writeText(location.href).then(() => alert('URLをコピーしました'));
  }
}

init();
</script>
</body>
</html>
